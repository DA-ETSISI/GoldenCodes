services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goldencodes_app
    restart: unless-stopped
    ports:
      - '3333:3333'
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3333
      LOG_LEVEL: info
      SESSION_DRIVER: cookie
      ADMIN_USER: admin
      ADMIN_PASSWORD: admin
      APP_KEY: Uyvd7o72tHN3mNUHy6nzGcBseTkH91tF
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: goldencodes
      DB_PASSWORD: goldencodes
      DB_DATABASE: app
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "node ace.js migration:run --force && node bin/server.js"

  db:
    image: mariadb:11
    container_name: goldencodes_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: app
      MARIADB_USER: goldencodes
      MARIADB_PASSWORD: goldencodes
    ports:
      - '3306:3306'
    healthcheck:
      test: [ 'CMD', 'healthcheck.sh', '--connect', '--innodb_initialized' ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
